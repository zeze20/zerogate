\* TLC configuration for the MR10 frame ownership state machine.
\*
\* N = 3 is sufficient for initial model checking of ownership correctness.
\* N = 4 may be used for deeper exploration (larger but still finite state space).

CONSTANTS
    N = 3

SPECIFICATION
    Spec

INVARIANTS
    TypeOK
    FrameInExactlyOneState
    FreeListOnlyFree
    FreeListMatchesState
    NonFreeNotInFree
    TxNotFreeBeforeCompletion
    UserNotFree
    RxNotFree
    InFillNotFree
    KernelNotFree
    CompletionNotFree
    OwnershipConsistent
